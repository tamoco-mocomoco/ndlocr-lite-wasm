<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ndlocr-lite-wasm</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      header {
        background: #1a365d;
        color: #fff;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      header span {
        font-size: 13px;
        opacity: 0.8;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .model-selector {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .model-selector label {
        font-size: 14px;
        font-weight: 600;
        color: #475569;
      }
      .model-selector select {
        padding: 6px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 14px;
        color: #334155;
        background: #fff;
        cursor: pointer;
      }
      .model-selector .desc {
        font-size: 13px;
        color: #94a3b8;
      }

      #drop-zone {
        border: 2px dashed #94a3b8;
        border-radius: 12px;
        padding: 48px;
        text-align: center;
        background: #fff;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #drop-zone.dragover {
        border-color: #3b82f6;
        background: #eff6ff;
      }
      #drop-zone p {
        color: #64748b;
        margin-bottom: 12px;
      }
      #drop-zone .hint {
        font-size: 13px;
        color: #94a3b8;
      }

      #file-input {
        display: none;
      }

      #progress-section {
        display: none;
        margin-top: 16px;
        background: #fff;
        border-radius: 8px;
        padding: 16px;
      }
      .progress-bar-container {
        background: #e2e8f0;
        border-radius: 4px;
        height: 8px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: #3b82f6;
        border-radius: 4px;
        width: 0%;
        transition: width 0.3s;
      }
      #progress-label {
        font-size: 14px;
        color: #475569;
      }

      #result-section {
        display: none;
        margin-top: 24px;
        gap: 24px;
      }
      #result-section.visible {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      @media (max-width: 768px) {
        #result-section.visible {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .panel-header {
        padding: 12px 16px;
        min-height: 46px;
        font-weight: 600;
        font-size: 14px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      .panel-body {
        padding: 16px;
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }

      #canvas-container {
        position: relative;
      }
      #canvas-container canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .tab-bar {
        display: flex;
        gap: 0;
        border-bottom: 1px solid #e2e8f0;
        flex-shrink: 0;
      }
      .tab-bar button {
        padding: 8px 16px;
        border: none;
        background: none;
        font-size: 13px;
        color: #64748b;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      .tab-bar button.active {
        color: #1e40af;
        border-bottom-color: #3b82f6;
        font-weight: 600;
      }
      .tab-bar button:hover {
        color: #334155;
      }

      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      #text-output {
        white-space: pre-wrap;
        font-family: "Noto Sans JP", sans-serif;
        font-size: 14px;
        line-height: 1.8;
      }

      #struct-output {
        font-family: "Noto Sans JP", sans-serif;
        font-size: 13px;
        line-height: 1.6;
      }
      .struct-block {
        margin-bottom: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        overflow: hidden;
      }
      .struct-block-header {
        padding: 6px 9px 6px 12px;
        background: #f1f5f9;
        font-size: 12px;
        font-weight: 600;
        color: #475569;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .struct-block-header .tag {
        background: #e2e8f0;
        color: #334155;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 11px;
      }
      .struct-block-header .block-copy-btn {
        margin-left: auto;
        padding: 2px 6px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        background: #fff;
        color: #64748b;
        font-size: 11px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        margin-right: 0px;
      }
      .struct-block-header .block-copy-btn:hover {
        background: #e2e8f0;
        color: #334155;
      }
      .struct-line {
        padding: 4px 12px;
        border-top: 1px solid #f1f5f9;
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .struct-line .line-type {
        font-size: 11px;
        color: #94a3b8;
        flex-shrink: 0;
      }
      .struct-line .line-text {
        flex: 1;
        min-width: 0;
        color: #1e293b;
      }
      .struct-line .line-copy-btn {
        flex-shrink: 0;
        padding: 0;
        width: 22px;
        height: 22px;
        border: none;
        border-radius: 3px;
        background: transparent;
        font-size: 12px;
        line-height: 22px;
        text-align: center;
        cursor: pointer;
        transition: background 0.15s;
      }
      .struct-line .line-copy-btn:hover {
        background: #e2e8f0;
      }
      .btn {
        padding: 4px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 12px;
        color: #475569;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #f1f5f9;
      }

      .notice {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 16px;
        font-size: 13px;
        line-height: 1.7;
        color: #92400e;
      }
      .notice strong {
        color: #78350f;
      }

      #edit-section {
        display: none;
        margin-top: 24px;
        gap: 24px;
      }
      #edit-section.visible {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      @media (max-width: 768px) {
        #edit-section.visible {
          grid-template-columns: 1fr;
        }
      }

      #edit-section .panel-body {
        position: relative;
      }
      #edit-section canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }
      #src-canvas {
        cursor: crosshair;
      }

      .edit-actions {
        grid-column: 1 / -1;
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .btn-primary {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.15s;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-secondary {
        padding: 10px 20px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        color: #475569;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.15s;
      }
      .btn-secondary:hover {
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ndlocr-lite-wasm</h1>
      <span>WASM</span>
    </header>

    <div class="container">
      <div class="model-selector">
        <label for="model-preset">モデル:</label>
        <select id="model-preset"></select>
        <span class="desc" id="model-desc"></span>
      </div>

      <div class="notice">
        <strong>ご注意:</strong><br />
        OCR実行時にAIモデル（約50〜77MB）のダウンロードが発生します。
        モバイルデータ通信ではパケット料金にご注意ください。
        Wi-Fi等の安定した通信環境でのご利用をおすすめします。
        <br />※
        ダウンロード済みのモデルはブラウザにキャッシュされるため、2回目以降は通信不要です。
      </div>

      <div id="drop-zone">
        <p>画像をドラッグ＆ドロップ、またはクリックして選択</p>
        <p class="hint">JPEG / PNG 対応</p>
        <input type="file" id="file-input" accept="image/*" />
      </div>

      <div id="edit-section">
        <div class="panel">
          <div class="panel-header">元画像（4点を指定）</div>
          <div class="panel-body">
            <canvas id="src-canvas"></canvas>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">補正プレビュー</div>
          <div class="panel-body">
            <canvas id="preview-canvas"></canvas>
          </div>
        </div>
        <div class="edit-actions">
          <button class="btn-primary" id="btn-correct-ocr">
            補正して OCR 実行
          </button>
          <button class="btn-secondary" id="btn-direct-ocr">
            そのまま OCR 実行
          </button>
        </div>
      </div>

      <div id="progress-section">
        <div id="progress-label">準備中...</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div id="result-section">
        <div class="panel">
          <div class="panel-header">検出結果</div>
          <div class="panel-body" id="canvas-container">
            <canvas id="result-canvas"></canvas>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            認識結果
            <button class="btn" id="copy-btn">全てコピー &#x1F4CB;</button>
          </div>
          <div class="tab-bar">
            <button class="active" data-tab="text">テキスト</button>
            <button data-tab="struct">構造</button>
          </div>
          <div class="panel-body">
            <div id="text-output" class="tab-content active"></div>
            <div id="struct-output" class="tab-content"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
